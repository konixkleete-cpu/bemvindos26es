<!-- Script simples para fechar menu mobile ao clicar em links -->
<script>
    document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
        link.addEventListener('click', () => {
            let navbarCollapse = document.querySelector('.navbar-collapse');

            }
        });
